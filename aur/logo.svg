<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="db" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#57C7FF"/>
      <stop offset="100%" stop-color="#1E3A5F"/>
    </linearGradient>
  </defs>

  <!-- Banco de dados -->
  <g transform="translate(250 250)">
    <ellipse cx="0" cy="-100" rx="110" ry="35"
             fill="url(#db)"/>

    <rect x="-110" y="-100"
          width="220"
          height="200"
          fill="url(#db)"/>

    <ellipse cx="0" cy="100"
             rx="110"
             ry="35"
             fill="#18304D"/>

    <!-- Divisões -->
    <ellipse cx="0" cy="-35"
             rx="110"
             ry="35"
             fill="none"
             stroke="#FFFFFF"
             stroke-opacity="0.25"
             stroke-width="3"/>

    <ellipse cx="0" cy="30"
             rx="110"
             ry="35"
             fill="none"
             stroke="#FFFFFF"
             stroke-opacity="0.25"
             stroke-width="3"/>
  </g>
</svg>