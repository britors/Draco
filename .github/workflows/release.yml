name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Cache electron-builder binaries
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/.electron-builder-cache
          key: ${{ runner.os }}-electron-builder-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-electron-builder-

      - name: Install dependencies
        run: npm ci

      - name: Build and package
        run: npm run package
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
          WIN_CSC_LINK: ""
          ELECTRON_BUILDER_CACHE: ${{ github.workspace }}/.electron-builder-cache

      - name: Upload installer to Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install rpm build tools
        run: sudo apt-get install -y rpm

      - name: Install dependencies
        run: npm ci

      - name: Build and package
        run: npm run package

      - name: Upload packages to Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.deb
            dist/*.rpm
