<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 280" width="820" height="280">
  <defs>
    <radialGradient id="bg" cx="25%" cy="50%" r="65%">
      <stop offset="0%" stop-color="#182035"/>
      <stop offset="100%" stop-color="#080d1a"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="prismClip">
      <polygon points="150,28 12,220 288,220"/>
    </clipPath>
    <!-- Divider gradient -->
    <linearGradient id="divider" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#2265a8" stop-opacity="0"/>
      <stop offset="40%"  stop-color="#4a9fd8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#2265a8" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="820" height="280" fill="url(#bg)" rx="22"/>

  <!-- Glow behind prism -->
  <polygon points="150,28 12,220 288,220" fill="#2255a0" opacity="0.28" filter="url(#glow)"/>

  <!-- ===== PRISM (left side) =====
       T  = (150, 28)   L = (12, 220)   R = (288, 220)
       ML = (81, 124)   MR= (219, 124)  MB= (150, 220)
  -->
  <polygon points="150,28 81,124 219,124"   fill="#64b3f4"/>
  <polygon points="81,124 150,220 219,124"  fill="#3d8fd9"/>
  <polygon points="12,220 81,124 150,220"   fill="#2265a8"/>
  <polygon points="288,220 219,124 150,220" fill="#174f8c"/>

  <!-- Data-row lines -->
  <g clip-path="url(#prismClip)" opacity="0.10">
    <line x1="0" y1="100" x2="300" y2="100" stroke="#9dd4fa" stroke-width="2"/>
    <line x1="0" y1="145" x2="300" y2="145" stroke="#9dd4fa" stroke-width="2"/>
    <line x1="0" y1="190" x2="300" y2="190" stroke="#9dd4fa" stroke-width="2"/>
  </g>

  <!-- Face edge lines -->
  <g fill="none" stroke="#05090f" stroke-width="1.8" stroke-linejoin="round">
    <polygon points="150,28 12,220 288,220"/>
    <line x1="81"  y1="124" x2="219" y2="124"/>
    <line x1="81"  y1="124" x2="150" y2="220"/>
    <line x1="219" y1="124" x2="150" y2="220"/>
  </g>

  <!-- Highlight edges -->
  <line x1="150" y1="28" x2="81"  y2="124" stroke="#9dd4fa" stroke-width="2.5" stroke-linecap="round" opacity="0.80"/>
  <line x1="150" y1="28" x2="219" y2="124" stroke="#6ab9f5" stroke-width="2.0" stroke-linecap="round" opacity="0.50"/>

  <!-- Apex -->
  <circle cx="150" cy="28" r="3.5" fill="#b8e2ff" opacity="0.90"/>

  <!-- Vertical divider -->
  <line x1="336" y1="0" x2="336" y2="280" stroke="url(#divider)" stroke-width="1"/>

  <!-- ===== TEXT (right side) ===== -->
  <!-- Main title -->
  <text x="576" y="130"
    font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
    font-size="54" font-weight="800" fill="#eef2f7"
    text-anchor="middle" letter-spacing="-1">Prisma<tspan fill="#4a9fd8">4</tspan>Postgres</text>

  <!-- Subtitle -->
  <text x="576" y="163"
    font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
    font-size="12" font-weight="500" fill="#3d6680"
    text-anchor="middle" letter-spacing="5">DATABASE EXPLORER</text>

  <!-- Tagline -->
  <text x="576" y="205"
    font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif"
    font-size="15" font-weight="400" fill="#5a8aaa"
    text-anchor="middle">A modern database explorer &amp; runner</text>
</svg>
